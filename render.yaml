# ==========================================================
# Render Blueprint — jamiikazini-pro (STACK KAMILI)
# Database (PostgreSQL+PostGIS) + Backend (Django) + Frontend (React/Vite)
# Mode: FREE / EAGER (hakuna worker/Redis ya kulipia)
#
# Namna ya kutumia:
#   Render dashboard -> New -> Blueprint -> chagua repo hii -> Apply.
# Render itatengeneza vitu vyote hapa chini na kuunganisha env vars yenyewe.
# SECRET_KEY inatengenezwa kiotomatiki; DB creds zinaingizwa kiotomatiki.
# ==========================================================

databases:
  - name: jamiikazini-db
    databaseName: jamiikazini
    user: jamiikazini
    plan: free
    postgresMajorVersion: "16"

services:
  # ---------- Backend (Django + gunicorn) ----------
  - type: web
    name: jamiikazini-pro
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn jamiikazini.wsgi:application
    envVars:
      - key: DJANGO_ENV
        value: prod
      - key: DJANGO_SETTINGS_MODULE          # manage.py (build.sh) itumie prod
        value: jamiikazini.settings.prod
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: CELERY_TASK_ALWAYS_EAGER        # tasks ndani ya web (bure)
        value: "true"
      - key: USE_REDIS
        value: "false"
      - key: SECRET_KEY                       # Render inaitengeneza kiotomatiki
        generateValue: true
      - key: FERNET_SECRET_KEY               # WEKA MWENYEWE: Fernet key halali (44-char base64)
        sync: false                          # tengeneza kwa: Fernet.generate_key()
      # Demo/presentation data (users, businesses, products, etc.) seeded on
      # every deploy while true - flip to "false" (or remove) before this
      # becomes the real production deployment. See build.sh.
      - key: SEED_DEMO_DATA
        value: "true"
      # Cloudinary (media storage in production) - WEKA MWENYEWE kwenye Render
      # dashboard baada ya kuunda akaunti ya Cloudinary (bure): bila hivi,
      # picha zilizopakiwa/zilizozalishwa hazitodumu (Render free disk si
      # ya kudumu - hupotea kila deploy).
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # CORS: inashughulikiwa na CORS_ALLOWED_ORIGIN_REGEXES (*.onrender.com) kwenye prod.py
      # ---- Database creds (zinaingizwa kiotomatiki kutoka jamiikazini-db) ----
      - key: POSTGRES_DB
        fromDatabase:
          name: jamiikazini-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: jamiikazini-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: jamiikazini-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: jamiikazini-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: jamiikazini-db
          property: port

  # ---------- Frontend (React/Vite static site) ----------
  - type: web
    name: jamiikazini-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://jamiikazini-pro.onrender.com/api/v1
      # Domain kuu ya jukwaa - hutumika kutambua kama mtumiaji amefika kupitia
      # subdomain ya duka/taasisi (<domain>.jamiikazini.com) badala ya
      # jamiikazini.com yenyewe (angalia src/main.jsx). Kuwezesha subdomain
      # halisi hadharani kunahitaji DNS ya wildcard (*.jamiikazini.com) na
      # "Wildcard Custom Domain" iwekwe kwenye huduma hii kwenye Render
      # dashboard - hatua za nje ya msimbo huu, lazima zifanywe na mmiliki.
      - key: VITE_CENTRAL_DOMAIN
        value: jamiikazini.com
    routes:
      - type: rewrite                         # React Router (SPA)
        source: /*
        destination: /index.html
