{% extends "admin/change_form.html" %}
{% block after_related_objects %}
  {{ block.super }}
  <hr>
  <h3>📈 Task Execution Trend (Last 7 Days)</h3>
  <canvas id="taskChart" width="100%" height="40"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const chartData = JSON.parse({{ adminform.form.instance.chart_data_json|safe|default:"[]" }});
    if (chartData && chartData.length) {
        const ctx = document.getElementById('taskChart').getContext('2d');
        const labels = chartData.map(d => d.date);
        const success = chartData.map(d => d.SUCCESS || 0);
        const failed = chartData.map(d => d.FAILED || 0);
        const retrying = chartData.map(d => d.RETRYING || 0);

        new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Success',
                        data: success,
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34,197,94,0.2)',
                        tension: 0.3,
                        fill: true
                    },
                    {
                        label: 'Failed',
                        data: failed,
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239,68,68,0.2)',
                        tension: 0.3,
                        fill: true
                    },
                    {
                        label: 'Retrying',
                        data: retrying,
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245,158,11,0.2)',
                        tension: 0.3,
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' },
                    title: { display: true, text: 'Task Status Over Time' }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }
  </script>
{% endblock %}
